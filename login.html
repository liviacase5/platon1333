<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <meta name="description" content="Login or register to DexxiGirl – Premium adult video streaming." />
    <title>Login – DexxiGirl</title>
    <link rel="stylesheet" href="assets/style.css" />
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar scrolled">
        <a href="index.html" class="logo"><span class="dexi">Dex</span><span class="girl">xiGirl</span><span
                class="logo-dot">.</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#videos">Videos</a></li>
            <li><a href="membership.html">Membership</a></li>
        </ul>
        <div class="nav-actions">
            <a href="membership.html" class="btn btn-primary" style="padding:9px 20px;font-size:0.9rem;">Join Now</a>
        </div>
    </nav>

    <!-- AUTH PAGE -->
    <div class="auth-page">
        <div class="auth-box fade-in-up visible">
            <div class="logo" style="justify-content:center;margin-bottom:28px;"><span class="dexi">Dex</span><span
                    class="girl">xiGirl</span><span class="logo-dot">.</span></div>

            <!-- Tabs -->
            <div class="auth-tabs">
                <div class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Sign In</div>
                <div class="auth-tab" id="tabRegister" onclick="switchTab('register')">Register</div>
            </div>

            <!-- LOGIN FORM -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input class="form-input" type="email" id="loginEmail" placeholder="you@example.com" required />
                </div>
                <div class="form-group">
                    <label style="display:flex;justify-content:space-between;">
                        Password
                        <a href="#" style="font-weight:400;color:var(--accent-red);font-size:0.82rem;">Forgot
                            password?</a>
                    </label>
                    <input class="form-input" type="password" id="loginPassword" placeholder="Enter your password"
                        required />
                </div>
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
                    <input type="checkbox" id="rememberMe" style="accent-color:var(--accent-red);" />
                    <label for="rememberMe" style="font-size:0.88rem;color:var(--text-secondary);">Remember me</label>
                </div>
                <button type="submit" class="btn btn-primary form-submit" id="loginBtn">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4" />
                        <polyline points="10 17 15 12 10 7" />
                        <line x1="15" y1="12" x2="3" y2="12" />
                    </svg>
                    Sign In
                </button>
                <div class="auth-divider">or continue with</div>
                <div class="social-login">
                    <button type="button" class="social-btn" onclick="socialLogin('Google')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                fill="#FBBC05" />
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335" />
                        </svg>
                        Google
                    </button>
                    <button type="button" class="social-btn" onclick="socialLogin('Twitter')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
                        </svg>
                        X / Twitter
                    </button>
                </div>
                <p class="auth-note">Don't have an account? <a href="#" onclick="switchTab('register')">Create one
                        free</a></p>
            </form>

            <!-- REGISTER FORM -->
            <form id="registerForm" style="display:none;" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input class="form-input" type="text" placeholder="Choose a username" required />
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input class="form-input" type="email" placeholder="you@example.com" required />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input class="form-input" type="password" placeholder="Min. 8 characters" required />
                </div>
                <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:20px;">
                    <input type="checkbox" id="ageCheck" style="accent-color:var(--accent-red);margin-top:3px;"
                        required />
                    <label for="ageCheck" style="font-size:0.85rem;color:var(--text-secondary);line-height:1.5;">I
                        confirm that I am 18 years of age or older and agree to the <a href="#"
                            style="color:var(--accent-red);">Terms of Service</a> and <a href="#"
                            style="color:var(--accent-red);">Privacy Policy</a>.</label>
                </div>
                <button type="submit" class="btn btn-primary form-submit">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <line x1="19" y1="8" x2="19" y2="14" />
                        <line x1="22" y1="11" x2="16" y2="11" />
                    </svg>
                    Create Account
                </button>
                <p class="auth-note">Already have an account? <a href="#" onclick="switchTab('login')">Sign in</a></p>
            </form>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"><span id="toastMsg">Welcome back!</span></div>

    <script src="assets/main.js"></script>
    <script>
        function switchTab(tab) {
            const isLogin = tab === 'login';
            document.getElementById('loginForm').style.display = isLogin ? '' : 'none';
            document.getElementById('registerForm').style.display = isLogin ? 'none' : '';
            document.getElementById('tabLogin').classList.toggle('active', isLogin);
            document.getElementById('tabRegister').classList.toggle('active', !isLogin);
        }
        function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.textContent = 'Signing in…';
            btn.disabled = true;
            setTimeout(() => {
                showToast('✅ Welcome back! Redirecting…');
                setTimeout(() => window.location.href = 'index.html', 1500);
            }, 1200);
        }
        function handleRegister(e) {
            e.preventDefault();
            showToast('🎉 Account created! Choose your plan.');
            setTimeout(() => window.location.href = 'membership.html', 1500);
        }
        function socialLogin(provider) {
            showToast('Connecting with ' + provider + '…');
        }
    </script>
</body>

</html>
